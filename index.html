<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
    body { display: flex; background: #000; color: #fff; height: 100vh; margin: 0; }
    #list { width: 300px; border-right: 1px solid #333; overflow-y: auto; }
    .item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; }
    .item:hover { background: #444; }
    video { flex-grow: 1; height: 100%; }
</style></head>
<body>
    <div id="list"></div>
    <video id="video" controls autoplay></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="./channels.js"></script>
    <script src="./streams.js"></script>
    <script>
        const video = document.getElementById('video');
        const hls = new Hls();
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = ch.name;
            div.onclick = () => {
                const s = streams.find(x => x.channel === ch.id);
                if(s) { hls.loadSource(s.url); hls.attachMedia(video); video.play(); }
            };
            document.getElementById('list').appendChild(div);
        });
    </script>
</body>
</html>
