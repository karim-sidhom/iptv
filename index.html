<!DOCTYPE html>
<html>
<head>
    <title>Lecteur IPTV Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #000; }
        #list { width: 350px; overflow-y: auto; background: #1a1a1a; color: #fff; }
        .item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .item:hover { background: #444; }
        #main { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="list">Chargement des données depuis l'API...</div>
    <div id="main">
        <video id="player" class="video-js vjs-big-play-centered" controls width="800" height="450"></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('player');
        
        // Utilisation du proxy pour contourner les blocages de l'API GitHub
        const API_CHANNELS = 'https://corsproxy.io/?https://iptv-org.github.io/api/channels.json';
        const API_STREAMS = 'https://corsproxy.io/?https://iptv-org.github.io/api/streams.json';

        async function init() {
            const [cRes, sRes] = await Promise.all([fetch(API_CHANNELS), fetch(API_STREAMS)]);
            const channels = await cRes.json();
            const streams = await sRes.json();

            // Filtrage exclusif Bein Sports
            const bein = channels.filter(c => c.name.toLowerCase().includes("bein"));
            
            document.getElementById('list').innerHTML = '';
            bein.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = ch.name;
                div.onclick = () => {
                    const s = streams.find(x => x.channel === ch.id);
                    if(s) {
                        player.src({ src: s.url, type: 'application/x-mpegURL' });
                        player.play();
                    }
                };
                document.getElementById('list').appendChild(div);
            });
        }
        init();
    </script>
</body>
</html>
