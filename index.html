<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lecteur IPTV Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; margin-top: 20px; }
        #channels-container { margin-top: 20px; padding: 10px; background: #222; border-radius: 8px; display: inline-block;}
        button { margin: 5px; padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;}
        button:hover { background: #0056b3; }
        video { background: #000; border: 2px solid #333; }
    </style>
</head>
<body>
    
    <video id="video" controls width="640" height="360"></video>

    <!-- Liste de vos chaînes -->
    <div id="channels-container">
        <h3>Chaînes Françaises</h3>
        <button onclick="playStream('VOTRE_LIEN_TF1.m3u8')">TF1</button>
        <button onclick="playStream('VOTRE_LIEN_FR2.m3u8')">France 2</button>
        <button onclick="playStream('VOTRE_LIEN_CANAL.m3u8')">Canal+</button>

        <h3>Chaînes Arabes & Sport</h3>
        <button onclick="playStream('VOTRE_LIEN_ALJAZEERA.m3u8')">Al Jazeera</button>
        <button onclick="playStream('VOTRE_LIEN_MBC.m3u8')">MBC</button>
        <button onclick="playStream('VOTRE_LIEN_BEIN1.m3u8')">BeIN Sports 1</button>
        <button onclick="playStream('VOTRE_LIEN_BEIN2.m3u8')">BeIN Sports 2</button>
    </div>

    <script>
        const video = document.getElementById('video');
        let hlsPlayer;

        function playStream(videoSrc) {
            if (Hls.isSupported()) {
                if (hlsPlayer) { hlsPlayer.destroy(); } 
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(videoSrc);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
                // Si la chaîne est morte, on l'affiche dans la console (F12)
                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.error("Erreur fatale : Ce lien est mort ou bloqué par le serveur (CORS).");
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.play();
            }
        }
    </script>
</body>
</html>
