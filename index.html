<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Lecteur TV IPTV</title>
    <style>
        body { display: flex; font-family: sans-serif; height: 100vh; margin: 0; background: #121212; color: white; }
        #sidebar { width: 350px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #list { overflow-y: auto; flex-grow: 1; }
        .channel-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; }
        .channel-item:hover { background: #444; }
        #player-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: black; }
        video { width: 100%; max-height: 90vh; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:10px; background:#000;">Liste des chaînes (FR/Arabes/Bein)</div>
    <div id="list">Chargement des chaînes...</div>
</div>

<div id="player-container">
    <video id="video" controls autoplay></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const listEl = document.getElementById('list');
    const hls = new Hls();

    async function initApp() {
        // Chargez vos fichiers localement (indispensable pour la performance)
        const [resChannels, resStreams] = await Promise.all([
            fetch('./channels.json'),
            fetch('./streams.json')
        ]);
        const channels = await resChannels.json();
        const streams = await resStreams.json();

        // FILTRAGE : Français (FR), Arabe (EG, MA, TN, DZ, SA, etc.), Bein Sports
        const filtered = channels.filter(c => {
            const isFR = c.country === "FR";
            const isArabe = ["EG", "MA", "TN", "DZ", "SA", "AE", "QA", "KW"].includes(c.country);
            const isBein = c.name.toLowerCase().includes("bein");
            return isFR || isArabe || isBein;
        });

        listEl.innerHTML = '';
        filtered.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerText = ch.name;
            div.onclick = () => {
                const stream = streams.find(s => s.channel === ch.id);
                if (stream) {
                    hls.loadSource(stream.url);
                    hls.attachMedia(video);
                    video.play();
                } else {
                    alert("Flux non disponible pour " + ch.name);
                }
            };
            listEl.appendChild(div);
        });
    }

    initApp();
</script>
</body>
</html>
